<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    
    <!-- 多彩元素渐变 -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="photoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="gameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- 内阴影效果 -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- 圆角方形背景底板 -->
  <rect x="20" y="20" width="360" height="360" rx="72" fill="url(#bgGrad)" stroke="#334155" stroke-width="2"/>
  
  <!-- 装饰性光晕环 -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="8 8"/>

  <!-- ========== 中央 “M” 形主体结构 ========== -->
  <!-- 左侧竖笔：改为播放三角形（代表视频/电影/番剧） -->
  <path d="M 98 98 L 98 302 L 184 200 Z" fill="url(#playGrad)" opacity="0.9"/>
  
  <!-- 中间倒V：代表桥梁/聚合（管理所有资源） -->
  <path d="M 128 98 L 200 160 L 272 98" fill="none" stroke="url(#photoGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 右侧竖笔：改为书本+照片融合形（代表漫画、小说、照片） -->
  <path d="M 302 98 C 302 98 302 200 302 200 L 302 302 C 286 302 260 286 260 260 L 260 140 C 260 114 286 98 302 98 Z" fill="url(#bookGrad)" opacity="0.9"/>
  
  <!-- 书本标记线 -->
  <path d="M 278 140 L 286 140" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M 278 170 L 286 170" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M 278 200 L 286 200" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- ========== 小点缀：代表游戏手柄的十字按键 ========== -->
  <g transform="translate(238, 262)" fill="url(#gameGrad)">
    <rect x="0" y="12" width="24" height="24" rx="6"/>
    <rect x="10" y="2" width="4" height="44" rx="2"/>
    <rect x="2" y="22" width="44" height="4" rx="2"/>
  </g>

  <!-- ========== 品牌文字 (使用标准字体) ========== -->
  <text x="200" y="360" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-size="32" font-weight="700" fill="#E2E8F0" text-anchor="middle" letter-spacing="6">MENGNEX</text>

  <!-- 底部小点缀线 -->
  <rect x="160" y="380" width="80" height="3" rx="1.5" fill="url(#playGrad)" opacity="0.6"/>
</svg>